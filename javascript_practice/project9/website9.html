<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Scissors-Paper</title>
    <link rel="stylesheet" href="website9.css">
</head>
<body>
    <h1>Rock-Scissors-Paper</h1>

    <div id="choicesConteiner">
        <button onclick="game('rock')">✊</button>
        <button onclick="game('scissors')">✌️</button>
        <button onclick="game('paper')">✋</button>
    </div>

    <h2 id="playerDisplay">Player choice:</h2>
    <h2 id="computerDisplay">Computer choice:</h2>

    <h3 id="resultDisplay"></h3>

    <p id="playerScore">Player Score:</p>
    <p id="computerScore">Computer Score:</p>

    <div id="scoreDisplay">Player score:
        <span id="playerScoreDisplay">0</span>
    </div>
    <div id="scoreDisplay">Computer score:
        <span id="computerScoreDisplay">0</span>
    </div>

    <script src="website9.js">
    </script>
</body>
</html>
