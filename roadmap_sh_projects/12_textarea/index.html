<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Textarea</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <h1>Write Your Text Here</h1>

    <form>
        <textarea name="textarea" id="textarea" placeholder="Start typing..." maxlength="250" rows="5" cols="5"></textarea>
        <span id="counter"> 0 / 250</span>
    </form>

    <script src="index.js"></script>
</body>
</html>
