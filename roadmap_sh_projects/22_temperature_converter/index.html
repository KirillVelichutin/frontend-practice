<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="converter-conteiner">
        <h1>Temperature Converter</h1>
        <p>Enter the tamperature, select units and submit</p>

	<form>
        <input type="number" id="temperature-input" name="temperature-input" placeholder="0.0">

        <select id="from-unit" class="unit-input">
            <option value=''>Select Unit</option>
            <option value='Celsius'>Celsius</option>
            <option value='Fahrenheit'>Fahrenheit</option>
            <option value='Kelvin'>Kelvin</option>
        </select>

        <select id="to-unit" class="unit-input">
            <option value='' class='option'>Select Unit</option>
            <option value='Celsius'>Celsius</option>
            <option value='Fahrenheit'>Fahrenheit</option>
            <option value='Kelvin'>Kelvin</option>
        </select>

        <button id="convert-btn" disabled>Convert</button>
	</form>

        <p id='result'></p>
    </div>

    <script src='index.js'></script>
</body>
</html>
